# Apollo Router — PRODUCTION config (self-hosted, free tier).
#
# Auth/limits architecture
# ------------------------
# Apollo Router's free tier excludes some features that require GraphOS:
#   - authentication.router.jwt     (JWT verification at gateway)
#   - limits.max_depth / max_height (operation limits)
#   - advanced telemetry attributes
#
# We compensate by:
#   - Verifying the JWT in EACH subgraph (Node, using `jsonwebtoken`).
#   - The router forwards the Authorization header verbatim.
#   - Depth/height limits implemented as Apollo Server plugins per subgraph.
#
# The router stays as a thin, free, blazing-fast federation gateway:
# composition, query planning, response merging, header propagation, CORS.

supergraph:
  listen: ${env.ROUTER_LISTEN:-0.0.0.0:4000}
  # Introspection ON for the MCP server and dashboard schema-aware tooling.
  introspection: true

# Forward Authorization (and tracing headers) to every subgraph. Each
# subgraph runs its own JWT verifier with the same JWT_SECRET, so the
# auth model is "one secret, verified once per request per subgraph".
headers:
  all:
    request:
      - propagate:
          named: "authorization"
      - propagate:
          named: "x-request-id"
      - propagate:
          named: "traceparent"
      - propagate:
          named: "tracestate"

# CORS — locked to the production dashboard origin and local dev.
cors:
  origins:
    - https://corefluxapp.com
    - https://www.corefluxapp.com
    - http://localhost:3000
    - http://localhost:5173
  allow_credentials: true
  allow_headers:
    - "Authorization"
    - "Content-Type"
    - "x-request-id"
    - "apollo-require-preflight"

# Surface subgraph errors for the dashboard's debug overlay.
include_subgraph_errors:
  all: true

# Conservative timeouts. JobDiva REST occasionally takes 3-5s under load
# so 15s gives DataLoader-batched fan-outs room. The router-level 30s
# cap stops runaway federated plans.
traffic_shaping:
  router:
    timeout: 30s
  all:
    timeout: 15s
    deduplicate_query: true

# Health check at /health for nginx upstream probes.
health_check:
  listen: 127.0.0.1:8088
  enabled: true

# Telemetry — JSON to stdout for journald to capture. Plug in an OTLP
# collector by uncommenting the otlp exporter and pointing it at
# Jaeger/Tempo. (Advanced span attributes are paid; the defaults are free.)
telemetry:
  exporters:
    logging:
      stdout:
        enabled: true
        format: json
  instrumentation:
    spans:
      mode: spec_compliant
