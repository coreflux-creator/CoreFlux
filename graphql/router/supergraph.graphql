type Placement
  @join__type(graph: COREFLUX, key: "id")
  @join__type(graph: JOBDIVA, key: "id", extension: true)
{
  id: ID!
  title: String @join__field(graph: COREFLUX)
  status: PlacementStatus @join__field(graph: COREFLUX)
  startDate: Date @join__field(graph: COREFLUX)
  endDate: Date @join__field(graph: COREFLUX)
  actualEndDate: Date @join__field(graph: COREFLUX)
  dueDate: Date @join__field(graph: COREFLUX)
  engagementType: EngagementType @join__field(graph: COREFLUX)
  remotePolicy: RemotePolicy @join__field(graph: COREFLUX)
  worksiteState: String @join__field(graph: COREFLUX)
  worksiteCountry: String @join__field(graph: COREFLUX)
  notes: String @join__field(graph: COREFLUX)
  endClientName: String @join__field(graph: COREFLUX)
  clientApproverName: String @join__field(graph: COREFLUX)
  clientApproverEmail: String @join__field(graph: COREFLUX)
  person: Person @join__field(graph: COREFLUX)
  endClient: Company @join__field(graph: COREFLUX)
  rates: PlacementRates @join__field(graph: COREFLUX)
  externalMappings: [ExternalMapping!]! @join__field(graph: COREFLUX)
  createdAt: DateTime! @join__field(graph: COREFLUX)
  updatedAt: DateTime! @join__field(graph: COREFLUX)

  """
  The JobDiva assignment record this placement was sourced from.
  Null when the placement was created in CoreFlux directly (no JobDiva
  Start exists). Resolved from external_entity_mappings by joining
  this placement's id to a row of kind='start'.
  """
  jobDiva: JobDivaAssignment @join__field(graph: JOBDIVA)
}

