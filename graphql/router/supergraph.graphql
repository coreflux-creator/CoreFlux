"""
A single JobDiva Assignment ("Start") — one engagement of one candidate
on one job for one customer. Equivalent of CoreFlux `Placement`.

Source: /apiv2/jobdiva/searchStart (BI feed) + /apiv2/jobdiva/searchStart
detail endpoint for fields the BI feed nulls out (notably payRate).
"""
type JobDivaAssignment
  @join__type(graph: JOBDIVA, key: "externalId")
{
  """JobDiva's internal Start ID (e.g. 55811863)."""
  externalId: ID!

  """JobDiva's reference number / job ref (e.g. "26-03327")."""
  refNumber: String

  """Assignment lifecycle status as reported by JobDiva."""
  status: String

  """Human-readable status from JobDiva (e.g. "Offer Accepted")."""
  startStatus: String
  startDate: Date
  endDate: Date

  """Date the candidate was originally submitted to the customer."""
  submittalDate: Date

  """Date the customer scheduled an interview."""
  interviewDate: Date

  """JobDiva's "position type" string (e.g. "contract", "perm")."""
  positionType: String

  """Internal notes JobDiva attached to the assignment."""
  internalNotes: String

  """Linked Job record (drives `Placement.title` in CoreFlux)."""
  job: JobDivaJob

  """Linked Candidate record (the placed person)."""
  candidate: JobDivaCandidate

  """Linked end-client / customer record."""
  customer: JobDivaCustomer

  """Linked job contact on the customer side, when set."""
  contact: JobDivaContact

  """
  Recruiter who placed this assignment. Mapped from JobDiva's
  `recruited by` / `recruiterId` fields. NOT a CoreFlux user yet —
  Phase 3 wires `placement_recruiters` to bind these.
  """
  recruiter: JobDivaRecruiter

  """
  Bill + pay rate detail. Falls through to /searchStart detail endpoint
  when the BI feed nulls out payRate (default behaviour on most tenants).
  """
  bill: JobDivaBilling

  """
  The raw V2 BI payload JobDiva returned. Internal-only — exposed for
  debugging when a tenant reports a field looks wrong. AI agents should
  use typed fields above, not this.
  """
  rawPayload: JSON @tag(name: "internal")
}

"""
Bill + pay rate detail for an assignment. Visible only to roles holding
the `bill_rate.read` scope (so recruiters see assignments but not margins).
"""
type JobDivaBilling
  @join__type(graph: JOBDIVA)
{
  """Final bill rate to the customer."""
  rate: Decimal
  rateUnit: String

  """Pay rate to the candidate."""
  payRate: Decimal
  payRateUnit: String

  """Currency (ISO-3) — extracted from JobDiva's "USD/Hour" style strings."""
  currency: String

  """Overtime multiplier (typically 1.5)."""
  otMultiplier: Decimal

  """Doubletime multiplier (typically 2.0)."""
  dtMultiplier: Decimal
}

"""
JobDiva Candidate record (the placed person). Mapped onto CoreFlux
Person via external_entity_mappings of kind='candidate'.
"""
type JobDivaCandidate
  @join__type(graph: JOBDIVA, key: "externalId")
{
  externalId: ID!
  firstName: String
  middleName: String
  lastName: String

  """
  Display name as stored in JobDiva (may differ from firstName + lastName).
  """
  displayName: String
  email: String
  phonePrimary: String
  phoneSecondary: String

  """Free-text address as returned by JobDiva. See homeAddress for parsed."""
  addressRaw: String

  """Best-effort parsed home address (may be incomplete)."""
  homeAddress: JobDivaAddress

  """Work authorisation status JobDiva stores."""
  workAuthStatus: String
  workAuthExpiry: Date

  """JobDiva-side flag — true if this candidate has been masked for export."""
  redacted: Boolean

  """Date the candidate was hired."""
  hireDate: Date
}

"""
JobDiva Contact record — a named individual on the customer's side
(hiring manager, approver, billing contact). Mapped via
external_entity_mappings kind='jobdiva_contact'.
"""
type JobDivaContact
  @join__type(graph: JOBDIVA, key: "externalId")
{
  externalId: ID!
  firstName: String
  lastName: String
  displayName: String
  title: String
  email: String
  phone: String
}

"""
JobDiva Customer record. Conceptually the same as CoreFlux Company
(end-client). Mapped via external_entity_mappings kind='jobdiva_customer'.
"""
type JobDivaCustomer
  @join__type(graph: JOBDIVA, key: "externalId")
{
  externalId: ID!
  name: String!
  industry: String
  billingAddress: JobDivaAddress

  """Customer-level billing terms / payment terms in JobDiva."""
  billingTerms: String

  """JobDiva account manager assigned to this customer (display name)."""
  accountManager: String
}

"""JobDiva Job record (the open requisition the assignment is filling)."""
type JobDivaJob
  @join__type(graph: JOBDIVA, key: "externalId")
{
  externalId: ID!

  """
  The role title displayed in the JobDiva UI (e.g. "Service Desk Analyst").
  """
  title: String

  """Internal job code / requisition number."""
  refNumber: String
  description: String
  department: String

  """JobDiva job status (e.g. Open, Hold, Closed)."""
  status: String

  """Hiring manager's display name on the customer side."""
  hiringManager: String

  """Date the job was posted in JobDiva."""
  postedDate: Date
}

"""Recruiter who closed the placement — JobDiva user, not CoreFlux."""
type JobDivaRecruiter
  @join__type(graph: JOBDIVA)
{
  externalId: ID
  displayName: String
}

