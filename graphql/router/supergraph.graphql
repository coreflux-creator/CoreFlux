type Query
  @join__type(graph: COREFLUX)
  @join__type(graph: JOBDIVA)
{
  placement(id: ID!): Placement @join__field(graph: COREFLUX)
  placements(personId: ID, status: PlacementStatus, limit: Int = 50): [Placement!]! @join__field(graph: COREFLUX)
  person(id: ID!): Person @join__field(graph: COREFLUX)
  people(limit: Int = 50): [Person!]! @join__field(graph: COREFLUX)
  company(id: ID!): Company @join__field(graph: COREFLUX)
  companies(limit: Int = 50): [Company!]! @join__field(graph: COREFLUX)

  """Look up a JobDiva assignment by its Start ID."""
  jobDivaAssignment(externalId: ID!): JobDivaAssignment @join__field(graph: JOBDIVA)

  """Look up a JobDiva job (open requisition) by its Job ID."""
  jobDivaJob(externalId: ID!): JobDivaJob @join__field(graph: JOBDIVA)

  """Look up a JobDiva candidate by its Candidate ID."""
  jobDivaCandidate(externalId: ID!): JobDivaCandidate @join__field(graph: JOBDIVA)

  """Look up a JobDiva customer (end-client) by its Customer ID."""
  jobDivaCustomer(externalId: ID!): JobDivaCustomer @join__field(graph: JOBDIVA)

  """Look up a JobDiva contact by its Contact ID."""
  jobDivaContact(externalId: ID!): JobDivaContact @join__field(graph: JOBDIVA)
}

