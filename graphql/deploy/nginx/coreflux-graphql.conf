# CoreFlux GraphQL — nginx upstream + location snippet.
#
# Drop this into /etc/nginx/sites-available/corefluxapp.com inside the
# `server { … }` block that fronts the dashboard, alongside the existing
# PHP-FPM `location /` and `location /api/` blocks.

# ---------------------------------------------------------------------
# /graphql  →  Apollo Router
# ---------------------------------------------------------------------
location /graphql {
    proxy_pass         http://127.0.0.1:4000/;
    proxy_http_version 1.1;
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   $scheme;
    proxy_set_header   X-Request-ID        $request_id;
    proxy_set_header   Authorization       $http_authorization;

    # Federated queries fanning out to 5 subgraphs can take a while.
    # The router itself caps at 30s; nginx mirrors that.
    proxy_connect_timeout   5s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;

    # Don't buffer — Apollo's Streamable HTTP & SSE clients break on it.
    proxy_buffering         off;
}

# ---------------------------------------------------------------------
# /mcp      →  MCP Server (HTTP transport for remote agentic AI clients)
# ---------------------------------------------------------------------
# Each MCP session is a single long-lived HTTP request that streams
# tool calls. We disable buffering and bump read timeouts accordingly.
location /mcp {
    proxy_pass         http://127.0.0.1:4100;
    proxy_http_version 1.1;
    proxy_set_header   Host                $host;
    proxy_set_header   X-Real-IP           $remote_addr;
    proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto   $scheme;
    proxy_set_header   Authorization       $http_authorization;
    proxy_set_header   Mcp-Session-Id      $http_mcp_session_id;

    proxy_buffering         off;
    proxy_cache             off;
    proxy_read_timeout      3600s;   # MCP streams can be long-lived.
    proxy_send_timeout      3600s;
    chunked_transfer_encoding off;
}

# ---------------------------------------------------------------------
# /healthz/graphql  →  Router health endpoint (internal probe)
# ---------------------------------------------------------------------
location = /healthz/graphql {
    allow 127.0.0.1;
    deny  all;
    proxy_pass http://127.0.0.1:8088/health;
}
