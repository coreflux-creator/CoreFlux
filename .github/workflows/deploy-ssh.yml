name: Deploy public_html to Cloudways via SCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout only what we need, and EXCLUDE the broken submodule path
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
          # exclude the submodule path so it never appears in the workspace
          sparse-checkout-cone: false
          sparse-checkout: |
            public_html
            !public_html/core

      # 2) Patch .gitmodules (if present) so the post-job cleanup won't fail
      - name: Neutralize submodule metadata (if present)
        run: |
          if [ -f .gitmodules ]; then
            git config -f .gitmodules submodule.public_html/core.path public_html/core || true
            git config -f .gitmodules submodule.public_html/core.url https://example.invalid/placeholder.git || true
            echo "----- .gitmodules after patch -----"
            cat .gitmodules || true
          else
            echo "No .gitmodules in repo."
          fi

      # 3) Set remote target to the real webroot (…/public_html)
      - name: Set deploy target to webroot
        run: echo "DEPLOY_TARGET=${{ secrets.CW_REMOTE_PATH }}/public_html" >> $GITHUB_ENV

      # 4) Copy files from local public_html/ to the remote webroot
      - name: Copy files with SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CW_SSH_HOST }}
          username: ${{ secrets.CW_SSH_USER }}
          key: ${{ secrets.CW_SSH_KEY }}
          port: ${{ secrets.CW_SSH_PORT }}
          source: "public_html/*"
          target: ${{ env.DEPLOY_TARGET }}
          overwrite: true
