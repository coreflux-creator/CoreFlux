name: Deploy public_html to Cloudways over SSH

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # add server host key so SSH doesn't prompt
      - name: Add Cloudways host to known_hosts
        env:
          HOST: ${{ secrets.CW_SSH_HOST }}
          PORT: ${{ secrets.CW_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts

      - name: Rsync public_html
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git*' --exclude='.github'
          path: public_html/
          remote_path: ${{ secrets.CW_REMOTE_PATH }}
          remote_host: ${{ secrets.CW_SSH_HOST }}
          remote_user: ${{ secrets.CW_SSH_USER }}
          remote_key: ${{ secrets.CW_SSH_KEY }}
          remote_port: ${{ secrets.CW_SSH_PORT }}
