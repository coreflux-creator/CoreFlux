name: Remote LS (no checkout)

on:
  workflow_dispatch:

jobs:
  ls:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect app root and webroot candidates
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CW_SSH_HOST }}
          username: ${{ secrets.CW_SSH_USER }}
          key: ${{ secrets.CW_SSH_KEY }}
          port: ${{ secrets.CW_SSH_PORT }}
          script: |
            set -e
            ROOT="${{ secrets.CW_REMOTE_PATH }}"
            echo "== APP ROOT =="
            echo "$ROOT"
            ls -la "$ROOT" || true

            CAND1="$ROOT/public_html"
            CAND2="$ROOT/public_html/public_html"

            for C in "$CAND1" "$CAND2"; do
              echo
              echo "== CANDIDATE WEBROOT: $C =="
              if [ -d "$C" ]; then
                ls -la "$C" | head -n 50 || true
                echo "-- .htaccess (first 60 lines) --"
                if [ -f "$C/.htaccess" ]; then sed -n '1,60p' "$C/.htaccess"; else echo "(no .htaccess)"; fi
                echo "-- _deploy_ok.txt --"
                if [ -f "$C/_deploy_ok.txt" ]; then cat "$C/_deploy_ok.txt"; else echo "(missing)"; fi
              else
                echo "(not a directory)"
              fi
            done
