name: Deploy to Cloudways

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CW_SSH_HOST }}
          username: ${{ secrets.CW_SSH_USER }}
          key: ${{ secrets.CW_SSH_KEY }}
          port: ${{ secrets.CW_SSH_PORT }}
          source: "."
          target: ${{ secrets.CW_REMOTE_PATH }}/public_html
          overwrite: true
          rm: false
