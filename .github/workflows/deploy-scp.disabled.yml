name: Deploy public_html to Cloudways via SCP

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      # Deploy to the app root (where your site serves from)
      -name: Set deploy target to webroot (…/public_html)
  run: echo "DEPLOY_TARGET=${{ secrets.CW_REMOTE_PATH }}/public_html" >> $GITHUB_ENV

      # Upload everything inside local public_html/ to the remote app root
      - name: Copy files with SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CW_SSH_HOST }}
          username: ${{ secrets.CW_SSH_USER }}
          key: ${{ secrets.CW_SSH_KEY }}
          port: ${{ secrets.CW_SSH_PORT }}
          source: "public_html/*"
          target: ${{ env.DEPLOY_TARGET }}
          overwrite: true
